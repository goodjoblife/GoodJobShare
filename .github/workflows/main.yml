name: Github Actions CI

on:
  push:
    branches:
      - master
      - dev
      - dev2
  pull_request:

env:
  REGISTRY: ghcr.io

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'yarn'
      - name: Install dependencies
        run: yarn install
      - name: Lint
        run: npm run lint && npm run stylelint

  test:
    name: unit test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'yarn'
      - name: Install dependencies
        run: yarn install
      - name: Unit test
        run: CI=true npm run testonly

  build:
    name: build (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental == true }}
    strategy:
      fail-fast: false
      matrix:
        node: [20, 24]
        include:
          - node: 20
            node_options: '--openssl-legacy-provider'
          - node: 24
            experimental: true
            node_options: '--openssl-legacy-provider'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'yarn'
      - name: Install dependencies
        run: yarn install
      - name: Build
        run: CI=false npm run build
        env:
          NODE_OPTIONS: ${{ matrix.node_options }}

  docker-production:
    name: Build and push production image
    if: github.repository == 'goodjoblife/GoodJobShare' && github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    concurrency:
      group: docker-production
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
    env:
      REPO: goodjoblife/goodjobshare/web-server
      IMAGE: goodjobshare:production
    steps:
      - uses: actions/checkout@v6
      - name: Log in to Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${REGISTRY} -u ${{ github.actor }} --password-stdin
      - name: Build image
        run: docker compose -f .github/docker-compose-production.yml build
      - name: Tag image
        run: docker tag ${IMAGE} ${REGISTRY}/${REPO}:production-${GITHUB_SHA}
      - name: Push image
        run: docker push ${REGISTRY}/${REPO}:production-${GITHUB_SHA}

  docker-stage:
    name: Build and push stage image
    if: github.repository == 'goodjoblife/GoodJobShare' && github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    concurrency:
      group: docker-stage
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
    env:
      REPO: goodjoblife/goodjobshare/web-server-dev
      IMAGE: goodjobshare:stage
    steps:
      - uses: actions/checkout@v6
      - name: Log in to Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${REGISTRY} -u ${{ github.actor }} --password-stdin
      - name: Build image
        run: docker compose -f .github/docker-compose-stage.yml build
      - name: Tag image
        run: docker tag ${IMAGE} ${REGISTRY}/${REPO}:stage
      - name: Push image
        run: docker push ${REGISTRY}/${REPO}:stage

  docker-dev:
    name: Build and push dev image
    if: github.repository == 'goodjoblife/GoodJobShare' && github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    concurrency:
      group: docker-dev
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
    env:
      REPO: goodjoblife/goodjobshare/web-server-dev
      IMAGE: goodjobshare:dev
    steps:
      - uses: actions/checkout@v6
      - name: Log in to Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${REGISTRY} -u ${{ github.actor }} --password-stdin
      - name: Build image
        run: docker compose -f .github/docker-compose-dev.yml build
      - name: Tag image
        run: docker tag ${IMAGE} ${REGISTRY}/${REPO}:dev
      - name: Push image
        run: docker push ${REGISTRY}/${REPO}:dev

  docker-dev2:
    name: Build and push dev2 image
    if: github.repository == 'goodjoblife/GoodJobShare' && github.event_name == 'push' && github.ref == 'refs/heads/dev2'
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    concurrency:
      group: docker-dev2
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
    env:
      REPO: goodjoblife/goodjobshare/web-server-dev
      IMAGE: goodjobshare:dev
    steps:
      - uses: actions/checkout@v6
      - name: Log in to Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${REGISTRY} -u ${{ github.actor }} --password-stdin
      - name: Build image
        run: docker compose -f .github/docker-compose-dev2.yml build
      - name: Tag image
        run: docker tag ${IMAGE} ${REGISTRY}/${REPO}:dev2
      - name: Push image
        run: docker push ${REGISTRY}/${REPO}:dev2

  deploy-stage:
    if: github.repository == 'goodjoblife/GoodJobShare' && github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: docker-stage
    uses: goodjoblife/github-actions/.github/workflows/trigger-deployment.yml@main
    with:
      event_type: goodjobshare-master-published
    secrets:
      APP_ID: ${{ secrets.APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}

  deploy-dev:
    if: github.repository == 'goodjoblife/GoodJobShare' && github.event_name == 'push' && github.ref == 'refs/heads/dev'
    needs: docker-dev
    uses: goodjoblife/github-actions/.github/workflows/trigger-deployment.yml@main
    with:
      event_type: goodjobshare-dev-published
    secrets:
      APP_ID: ${{ secrets.APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}

  deploy-dev2:
    if: github.repository == 'goodjoblife/GoodJobShare' && github.event_name == 'push' && github.ref == 'refs/heads/dev2'
    needs: docker-dev2
    uses: goodjoblife/github-actions/.github/workflows/trigger-deployment.yml@main
    with:
      event_type: goodjobshare-dev2-published
    secrets:
      APP_ID: ${{ secrets.APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
